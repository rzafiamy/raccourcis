<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <title>Raccourci</title>
  <link rel="stylesheet" href="./src/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="window-controls">
      <div class="control close"    id="winClose"    title="Close"></div>
      <div class="control minimize" id="winMinimize" title="Minimize"></div>
      <div class="control maximize" id="winMaximize" title="Maximize"></div>
    </div>

    <div class="sidebar-logo">
      <i data-lucide="zap"></i>
      <span>Raccourci</span>
    </div>

    <div class="sidebar-section-label">Library</div>
    <a href="#" class="nav-item active" data-category="all">
      <i data-lucide="layout-grid"></i><span>All Shortcuts</span>
    </a>
    <a href="#" class="nav-item" data-category="favorites">
      <i data-lucide="star"></i><span>Favorites</span>
    </a>
    <a href="#" class="nav-item" data-category="recent">
      <i data-lucide="history"></i><span>Recent</span>
    </a>

    <div class="sidebar-section-label">Automation</div>
    <a href="#" class="nav-item" data-category="ai">
      <i data-lucide="sparkles"></i><span>AI Workflows</span>
    </a>
    <a href="#" class="nav-item" data-category="personal">
      <i data-lucide="zap"></i><span>Personal</span>
    </a>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-section-label">System</div>
    <a href="#" class="nav-item" id="openSettings">
      <i data-lucide="settings"></i><span>Settings</span>
    </a>
  </aside>

  <!-- ── Main content ──────────────────────────────── -->
  <main class="main-content" id="mainContent">
    <header class="header">
      <h1>All Shortcuts</h1>
      <div class="search-container">
        <i data-lucide="search"></i>
        <input class="search-input" type="text" placeholder="Search…" autocomplete="off">
      </div>
    </header>
    <div class="shortcut-grid" id="shortcutGrid"></div>
  </main>

  <!-- ── Editor panel (full-screen overlay inside #app) ── -->
  <div class="editor-panel" id="editorPanel">

    <!-- Top bar -->
    <div class="editor-topbar">
      <button class="editor-back-btn" id="editorBackBtn" title="Back">
        <i data-lucide="chevron-left"></i>
      </button>
      <input class="editor-name-input" id="editorName" type="text" placeholder="Shortcut name…" spellcheck="false">
      <div class="editor-topbar-meta">
        <!-- Color swatches -->
        <div class="color-picker" id="colorPicker">
          <div class="color-swatch bg-blue"   data-color="bg-blue"></div>
          <div class="color-swatch bg-pink"   data-color="bg-pink"></div>
          <div class="color-swatch bg-purple" data-color="bg-purple"></div>
          <div class="color-swatch bg-orange" data-color="bg-orange"></div>
          <div class="color-swatch bg-green"  data-color="bg-green"></div>
          <div class="color-swatch bg-cyan"   data-color="bg-cyan"></div>
          <div class="color-swatch bg-indigo" data-color="bg-indigo"></div>
        </div>
        <!-- Category -->
        <select class="input-field select-field editor-category" id="editorCategory">
          <option value="personal">Personal</option>
          <option value="ai">AI Workflow</option>
        </select>
        <!-- Favorite -->
        <label class="fav-toggle" title="Favorite">
          <input type="checkbox" id="editorFavorite">
          <i data-lucide="star"></i>
        </label>
      </div>
      <div class="editor-topbar-actions">
        <button class="btn btn-ghost" id="editorSaveBtn">Save</button>
        <button class="btn btn-primary" id="editorRunBtn">
          <i data-lucide="play"></i> Run
        </button>
      </div>
    </div>

    <!-- Body: canvas + palette -->
    <div class="editor-body">

      <!-- Canvas (left) -->
      <div class="editor-canvas" id="editorCanvas">
        <div class="canvas-empty" id="canvasEmpty">
          <i data-lucide="mouse-pointer-click"></i>
          <p>Pick actions from the panel on the right<br>to build your workflow.</p>
        </div>
        <div class="canvas-steps" id="editorSteps"></div>
      </div>

      <!-- Palette (right) -->
      <aside class="editor-palette">
        <div class="palette-header">
          <div class="palette-search-wrap">
            <i data-lucide="search"></i>
            <input class="palette-search" id="paletteSearch" type="text" placeholder="Search actions…" autocomplete="off">
          </div>
        </div>
        <div class="palette-list" id="paletteList"></div>
      </aside>

    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════════════════
     Settings Modal
══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-content settings-modal">
    <div class="modal-header">
      <h2>AI Settings</h2>
      <button class="action-btn" id="closeSettings" title="Close">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="modal-body">
      <p class="settings-hint">
        Works with any OpenAI-compatible endpoint (OpenAI, Mistral, Ollama, etc.)
      </p>
      <div class="form-group">
        <label>Base URL</label>
        <input class="input-field" id="aiBaseUrl" type="text" placeholder="https://api.openai.com/v1">
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input class="input-field" id="aiApiKey" type="password" placeholder="sk-…">
      </div>
      <div class="form-group">
        <label>Model</label>
        <input class="input-field" id="aiModel" type="text" placeholder="gpt-4o-mini">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="saveSettings">Save Settings</button>
    </div>
  </div>
</div>

<script type="module" src="./src/renderer.js"></script>
</body>
</html>
