<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <title>Raccourci</title>
  <link rel="stylesheet" href="./src/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="window-controls">
      <div class="control close"    id="winClose"></div>
      <div class="control minimize" id="winMinimize"></div>
      <div class="control maximize" id="winMaximize"></div>
    </div>

    <div class="sidebar-logo">
      <i data-lucide="zap"></i>
      <span>Raccourci</span>
    </div>

    <div class="sidebar-section-label">Library</div>
    <a href="#" class="nav-item active" data-category="all">
      <i data-lucide="layout-grid"></i><span>All Shortcuts</span>
    </a>
    <a href="#" class="nav-item" data-category="favorites">
      <i data-lucide="star"></i><span>Favorites</span>
    </a>
    <a href="#" class="nav-item" data-category="recent">
      <i data-lucide="history"></i><span>Recent</span>
    </a>

    <div class="sidebar-section-label">Automation</div>
    <a href="#" class="nav-item" data-category="ai">
      <i data-lucide="sparkles"></i><span>AI Workflows</span>
    </a>
    <a href="#" class="nav-item" data-category="personal">
      <i data-lucide="zap"></i><span>Personal</span>
    </a>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-section-label">System</div>
    <a href="#" class="nav-item" id="openSettings">
      <i data-lucide="settings"></i><span>Settings</span>
    </a>
  </aside>

  <!-- ── Main content ──────────────────────────────── -->
  <main class="main-content">
    <header class="header">
      <h1>All Shortcuts</h1>
      <div class="search-container">
        <i data-lucide="search"></i>
        <input class="search-input" type="text" placeholder="Search…" autocomplete="off">
      </div>
    </header>

    <div class="shortcut-grid" id="shortcutGrid"></div>
  </main>
</div>

<!-- ══════════════════════════════════════════════════════
     Workflow Editor Modal
══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="editorModal">
  <div class="modal-content editor-modal">

    <div class="modal-header">
      <input class="modal-title-input" id="editorName" type="text" placeholder="Shortcut name">
      <button class="action-btn" id="closeEditorModal" title="Close">
        <i data-lucide="x"></i>
      </button>
    </div>

    <div class="modal-body">

      <!-- Appearance row -->
      <div class="editor-meta-row">
        <div class="form-group">
          <label>Color</label>
          <div class="color-picker">
            <div class="color-swatch bg-blue"   data-color="bg-blue"></div>
            <div class="color-swatch bg-pink"   data-color="bg-pink"></div>
            <div class="color-swatch bg-purple" data-color="bg-purple"></div>
            <div class="color-swatch bg-orange" data-color="bg-orange"></div>
            <div class="color-swatch bg-green"  data-color="bg-green"></div>
            <div class="color-swatch bg-cyan"   data-color="bg-cyan"></div>
            <div class="color-swatch bg-indigo" data-color="bg-indigo"></div>
          </div>
        </div>

        <div class="form-group" style="display:flex;gap:12px;align-items:center;">
          <div>
            <label>Category</label>
            <select class="input-field select-field" id="editorCategory">
              <option value="personal">Personal</option>
              <option value="ai">AI Workflow</option>
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:24px;">
            <input type="checkbox" id="editorFavorite">
            <label style="margin:0;text-transform:none;font-size:14px;">Favorite</label>
          </div>
        </div>
      </div>

      <!-- Steps -->
      <div class="form-group">
        <label>Actions</label>
        <div id="editorSteps"></div>
        <button class="add-step-btn" id="addStep">
          <i data-lucide="plus"></i>
          <span>Add Action</span>
        </button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost"    id="editorRunBtn">Run now</button>
      <button class="btn btn-primary"  id="editorSaveBtn">Save</button>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     Action Picker Modal
══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="actionPickerModal">
  <div class="modal-content picker-modal">
    <div class="modal-header">
      <h2>Add Action</h2>
      <button class="action-btn" id="closeActionPicker" title="Close">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="modal-body">
      <div id="actionPickerContent"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     Settings Modal
══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-content settings-modal">
    <div class="modal-header">
      <h2>AI Settings</h2>
      <button class="action-btn" id="closeSettings" title="Close">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="modal-body">
      <p class="settings-hint">
        Works with any OpenAI-compatible endpoint (OpenAI, Mistral, Ollama, etc.)
      </p>
      <div class="form-group">
        <label>Base URL</label>
        <input class="input-field" id="aiBaseUrl" type="text" placeholder="https://api.openai.com/v1">
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input class="input-field" id="aiApiKey" type="password" placeholder="sk-…">
      </div>
      <div class="form-group">
        <label>Model</label>
        <input class="input-field" id="aiModel" type="text" placeholder="gpt-4o-mini">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="saveSettings">Save Settings</button>
    </div>
  </div>
</div>

<script type="module" src="./src/renderer.js"></script>
</body>
</html>
